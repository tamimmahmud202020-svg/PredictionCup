        }

        }
        .pc-root ::selection {

        }
        .pc-root {

        }
        .pc-root ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .pc-root ::-webkit-scrollbar-track {
            background: #100d08;
        }
        .pc-root ::-webkit-scrollbar-thumb {
            background: #3a3526;
            border-radius: 8px;
        }
        @keyframes pcFadeUp {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes pcFloat {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-9px) rotate(6deg);
            }
        }
        @keyframes pcPulseGlow {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(255, 213, 74, .32);
            }
            50% {
                box-shadow: 0 0 0 8px rgba(255, 213, 74, 0);
            }
        }
        @keyframes pcBounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-14px);
            }
        }
        @keyframes pcShimmer {
            to {
                background-position: 200% center;
            }
        }
        @keyframes pcSlideDown {
            0% {
                opacity: 0;
                transform: translate(-50%, -14px);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
        @keyframes pcModalIn {
            0% {
                opacity: 0;
                transform: scale(.96) translateY(6px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        @keyframes pcLoadSweep {
            0% {
                transform: translateX(-110%);
            }
            100% {
                transform: translateX(280%);
            }
        }
        @keyframes pcStripPan {
            to {
                background-position: 200% center;
            }
        }
        @keyframes pcRise {
            0% {
                height: 0;
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }
        @keyframes pcConfetti {
            0% {
                transform: translateY(-12px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% {
                transform: translateY(140px) rotate(380deg);
                opacity: 0;
            }
        }
        @keyframes pcSparkle {
            0%,
            100% {
                opacity: .25;
                transform: scale(.85);
            }
            50% {
                opacity: 1;
                transform: scale(1.15);
            }
        }
        @keyframes pcCrownBob {
            0%,
            100% {
                transform: translateY(0) rotate(-3deg);
            }
            50% {
                transform: translateY(-4px) rotate(3deg);
            }
        }
        @keyframes pcRingSpin {
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes pcKickIn {
            0% {
                transform: scale(.4) rotate(-30deg);
                opacity: 0;
            }
            60% {
                transform: scale(1.12) rotate(8deg);
                opacity: 1;
            }
            100% {
                transform: scale(1) rotate(0deg);
            }
        }
        @keyframes pcGoldSheen {
            0% {
                background-position: -150% center;
            }
            100% {
                background-position: 250% center;
            }
        }
        @keyframes pcPopIn {
            0% {
                transform: scale(.85);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        @keyframes pcUnderlineGlow {
            0%,
            100% {
                opacity: .6;
            }
            50% {
                opacity: 1;
            }
        }

        }
        .pc-float {
            animation: pcFloat 5.5s ease-in-out infinite;
        }
        .pc-card-hover {

        .pc-card-hover:hover {

        .pc-btn {

        }
        .pc-btn:hover {

        }
        .pc-btn:active {
            transform: scale(.95);
        }
        .pc-btn:focus-visible {

            outline-offset: 2px;
        }
        .pc-modal-in {
            animation: pcModalIn .25s cubic-bezier(.2, .8, .3, 1) both;
        }
        .pc-toast-in {
            animation: pcSlideDown .32s cubic-bezier(.2, .8, .3, 1) both;
        }
        .pc-shimmer-text {

        .pc-glow-pulse {
            animation: pcPulseGlow 2.4s ease-in-out infinite;
        }
        .pc-bounce {
            animation: pcBounce 1.1s ease-in-out infinite;
        }
        .pc-load-fill {
            animation: pcLoadSweep 1.25s ease-in-out infinite;

        .pc-strip {
            animation: pcStripPan 7s linear infinite;

        .pc-input {

        .pc-input:focus {

            try {
                const r = await window.storage.get(SK, true);
                if (r?.value) {
                    const d = JSON.parse(r.value);
                    if (d?.matches?.length >= 72) return { data: d };
                    return { data: null, notFound: false, error: `malformed (matches: ${d?.matches?.length ?? "none"})` };
                }
                return { data: null, notFound: true };
            } catch (e) {
                try {

                    if (r?.value) {
                        const d = JSON.parse(r.value);
                        if (d?.matches?.length >= 72) return { data: d };
                        return { data: null, notFound: false, error: `non-shared malformed (matches: ${d?.matches?.length ?? "none"})` };
                    }
                    return { data: null, notFound: true };

                    return { data: null, notFound: false, error: e2?.message || String(e2) };

        function numEq(a, b) {
            const na = Number(a),
                nb = Number(b);
            if (Number.isNaN(na) || Number.isNaN(nb)) return false;
            return na === nb;
        }

        function isPredictedDraw(r) {

        }

            if (!result?.winner) return {};
            const isBig = BIG_STAGES.includes(stage);
            const isKO = KNOCKOUT_STAGES.includes(stage);
            const winPt = isBig ? 2 : 1;
            const exactPt = isBig ? 3 : 2;
            const drawBonusPt = isBig ? 2.5 : 1.5;
            const actualWasDrawScore = numEq(result.score1, result.score2);
            return Object.fromEntries(PLAYERS.map(p => {

                if (!ok) return [p, 0];
                const exact = numEq(r.score1, result.score1) && numEq(r.score2, result.score2);
                if (exact) return [p, exactPt];
                if (isKO && isPredictedDraw(r) && actualWasDrawScore) return [p, drawBonusPt];
                return [p, winPt];
            }));
        }

        function computeGroupTable(matches, group) {
            const gMatches = matches.filter(m => m.stage === "Group Stage" && m.group === group);
            const teams = [...new Set(gMatches.flatMap(m => [m.team1, m.team2]))];
            const stats = Object.fromEntries(teams.map(t => [t, { team: t, P: 0, W: 0, D: 0, L: 0, GF: 0, GA: 0, GD: 0,
                    Pts: 0 }]));
            let playedCount = 0;
            gMatches.forEach(m => {
                if (!m.result?.winner) return;
                playedCount++;
                const s1 = Number(m.result.score1),
                    s2 = Number(m.result.score2);
                const t1 = stats[m.team1],
                    t2 = stats[m.team2];
                t1.P++;
                t2.P++;
                t1.GF += s1;
                t1.GA += s2;
                t2.GF += s2;
                t2.GA += s1;
                if (s1 > s2) { t1.W++;
                    t1.Pts += 3;
                    t2.L++; } else if (s2 > s1) { t2.W++;
                    t2.Pts += 3;
                    t1.L++; } else { t1.D++;
                    t2.D++;
                    t1.Pts += 1;
                    t2.Pts += 1; }
            });
            teams.forEach(t => { stats[t].GD = stats[t].GF - stats[t].GA; });
            const table = teams.map(t => stats[t]).sort((a, b) => b.Pts - a.Pts || b.GD - a.GD || b.GF - a.GF || a.team
                .localeCompare(b.team));
            const totalMatches = gMatches.length;
            return { table, complete: playedCount === totalMatches && totalMatches > 0 };
        }

            if (!comboSlots) return null;
            const slotOrder = ["A", "B", "D", "E", "G", "I", "K", "L"];
            const thirdForWinnerGroup = {};
            slotOrder.forEach((winnerGroup, idx) => { thirdForWinnerGroup[winnerGroup] = comboSlots[idx]; });
            const thirdTeamByGroup = Object.fromEntries(qualifyingThirds.map(t => [t.group, t.team]));

                function resolve(slot, otherSlot) {
                    if (slot.t === "W") return winnerOf(slot.g);
                    if (slot.t === "R") return runnerUpOf(slot.g);
                    if (slot.t === "T") {
                        const winnerGroup = otherSlot.g;
                        const thirdGroup = thirdForWinnerGroup[winnerGroup];
                        return thirdTeamByGroup[thirdGroup];
                    }
                    return null;
                }
                return [resolve(a, b), resolve(b, a)];

                const [team1, team2] = resolveMatch({ a, b });
                return { id: m, stage: "Round of 32", team1, team2 };

        // ── TeamInput ──
        function TeamInput({ value, onChange, placeholder }) {
            const [q, setQ] = useState(value || "");
            const [open, setOpen] = useState(false);
            const ref = useRef();
            useEffect(() => { setQ(value || ""); }, [value]);
            useEffect(() => {
                const fn = e => { if (!ref.current?.contains(e.target)) setOpen(false); };
                document.addEventListener("mousedown", fn);
                return () => document.removeEventListener("mousedown", fn);
            }, []);
            const opts = q.length > 0 ? ALL_TEAMS.filter(t => t.toLowerCase().includes(q.toLowerCase())).slice(0, 8) : [];
            return (
                <div ref={ref} style={{ position: "relative", flex: 1 }}>
                    <input className="pc-input" style={S.inp} value={q} placeholder={placeholder} autoComplete="off"
                        onChange={e => { setQ(e.target.value);
                            onChange(e.target.value);
                            setOpen(true); }}
                        onFocus={() => setOpen(true)} />
                    {open && opts.length > 0 && (
                        <div style={S.drop}>
                            {opts.map(t => (
                                <div key={t} className="pc-drop-row" style={S.dropRow}
                                    onMouseDown={e => { e.preventDefault();
                                        setQ(t);
                                        onChange(t);
                                        setOpen(false); }}>
                                    {flagOf(t)} {t}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // ── Veil ──
        function Veil({ children, onBg }) {
            return (
                <div style={S.veilBg} onMouseDown={e => { if (e.target === e.currentTarget) onBg?.(); }}>
                    <div className="pc-modal-in" style={S.veilCard} onMouseDown={e => e.stopPropagation()}>{children}</div>
                </div>
            );
        }

        // ── MatchCard ──
        function MatchCard({ match, isAdmin, idx, onPred, onResult, onEditKO, onDeleteKO }) {
            const done = !!match.result?.winner;
            const predCount = PLAYERS.filter(p => match.predictions?.[p]?.winner).length;
            return (
                <div className="pc-card-hover pc-fade-up" style={{ ...S.matchCard, animationDelay: `${Math.min(idx, 6) * 0.04}s` }}>
                    <div style={S.matchTop}>
                        <span style={S.matchStageTag}>{match.group ? `Group ${match.group}` : match.stage}</span>
                        {done && <span style={{ ...S.ptBadge, background: "#1a4d2e", color: "#4ade80" }}>FT</span>}
                    </div>
                    <div style={S.matchTeams}>
                        <div style={S.teamBlock}>
                            <span style={S.teamFlag}>{flagOf(match.team1)}</span>
                            <span style={S.teamName}>{match.team1}</span>
                        </div>
                        <div style={S.vsScore}>
                            {done
                                ? <div style={S.scoreText}>{match.result.score1}–{match.result.score2}</div>
                                : <div style={S.vsText}>VS</div>}
                        </div>
                        <div style={S.teamBlock}>
                            <span style={S.teamFlag}>{flagOf(match.team2)}</span>
                            <span style={S.teamName}>{match.team2}</span>
                        </div>
                    </div>
                    <div style={S.matchBtnRow}>
                        <button className="pc-btn" style={S.smallBtn} onClick={onPred}>
                            📝 {predCount > 0 ? `${predCount}/3 Predicted` : "Predict"}
                        </button>
                        {isAdmin && (
                            <button className="pc-btn" style={{ ...S.smallBtn, ...(done ? S.smallBtnDone : {}) }}
                            onClick={onResult}>
                                {done ? "✅ Result Set" : "🎯 Set Result"}
                            </button>
                        )}
                        {isAdmin && onEditKO && <button className="pc-btn" style={S.iconBtn} onClick={onEditKO}>✏️</button>}
                        {isAdmin && onDeleteKO && <button className="pc-btn" style={S.iconBtn} onClick={onDeleteKO}>🗑</button>}
                    </div>
                    {predCount > 0 && (
                        <div style={S.predsStrip}>
                            {PLAYERS.map(p => {
                                const pr = match.predictions?.[p];
                                if (!pr?.winner) return null;
                                const pts = done ? (calcPts(match.predictions, match.result, match.stage)[p] ?? 0) :
                                null;
                                return (
                                    <span key={p}>
                                        <b style={{ color: "#c9a13b" }}>{p}:</b> {pr.score1}–{pr.score2}
                                        {pts !== null && <b style={{ color: pts > 0 ? "#4ade80" : "#fca5a5" }}>
                                            ({pts}pt)</b>}
                                    </span>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        }

        // ── ScoreRow ──
        function ScoreRow({ label, val, onChange, accent }) {
            return (
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                    <span style={{ width: 64, fontSize: 12, color: "#9a9488", fontWeight: 600 }}>{label}</span>
                    <input className="pc-input" style={{ ...S.inp, width: 70, textAlign: "center",
                            fontFamily: "'JetBrains Mono', 'SF Mono', Consolas, monospace", fontWeight: 700,
                            borderColor: accent }}
                    type="number" min="0" value={val} onChange={e => onChange(e.target.value)} />
                </div>
            );
        }

        // ── PredsModal ──
        function PredsModal({ match, onSave, onClose }) {
            const isKO = match.stage !== "Group Stage";
            const [vals, setVals] = useState(() => {
                const init = {};
                PLAYERS.forEach(p => {
                    const existing = match.predictions?.[p];
                    init[p] = existing ?
                        { score1: existing.score1 ?? "", score2: existing.score2 ?? "", winner: existing.winner || "" } :
                        { score1: "", score2: "", winner: "" };
                });
                return init;
            });

            function setScore(p, key, v) {
                setVals(prev => {
                    const s1 = key === "score1" ? v : prev[p].score1;
                    const s2 = key === "score2" ? v : prev[p].score2;
                    const prevWinner = prev[p].winner;
                    let winner = "";
                    if (s1 !== "" && s2 !== "") {
                        const n1 = Number(s1),
                            n2 = Number(s2);
                        if (n1 > n2) winner = match.team1;
                        else if (n2 > n1) winner = match.team2;
                        else {
                            winner = isKO ?
                                (prevWinner === match.team1 || prevWinner === match.team2 ? prevWinner : "") :
                                "Draw";
                        }
                    }
                    return { ...prev, [p]: { score1: s1, score2: s2, winner } };
                });
            }

            function setManualWinner(p, team) {
                setVals(prev => ({ ...prev, [p]: { ...prev[p], winner: team } }));
            }

            return (
                <Veil onBg={onClose}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                        <p style={S.mh}>📝 Predictions</p>
                        <button className="pc-btn" style={S.xBtn} onClick={onClose}>✕</button>
                    </div>
                    <p style={{ fontSize: 13, color: "#9a9488", margin: "0 0 16px" }}>
                        {flagOf(match.team1)} {match.team1} vs {match.team2} {flagOf(match.team2)}
                    </p>
                    {PLAYERS.map((p, i) => {
                        const pv = vals[p];
                        const scoresEnteredAndLevel = pv.score1 !== "" && pv.score2 !== "" && Number(pv.score1) === Number(
                            pv.score2);
                        const needsManualPick = isKO && scoresEnteredAndLevel;
                        return (
                            <div key={p} style={{ ...S.card, padding: 12, marginBottom: 10,
                                    borderLeft: `3px solid ${HOST_ACCENTS[i]}` }}>
                                <div style={{ fontWeight: 700, color: "#ffd54a", fontSize: 13, marginBottom: 8,
                                        fontFamily: "'Space Grotesk', -apple-system, 'Segoe UI', sans-serif" }}>{p}</div>
                                <div style={{ display: "flex", gap: 12 }}>
                                    <ScoreRow label={match.team1} val={pv.score1} onChange={v => setScore(p, "score1",
                                        v)} />
                                    <ScoreRow label={match.team2} val={pv.score2} onChange={v => setScore(p, "score2",
                                        v)} />
                                </div>
                                {needsManualPick && (
                                    <div style={{ marginTop: 4 }}>
                                        <span style={{ fontSize: 11.5, color: "#c9a13b", fontWeight: 700,
                                                display: "block", marginBottom: 6 }}>
                                            ⚽ Level score — pick who wins on penalties
                                        </span>
                                        <div style={{ display: "flex", gap: 8 }}>
                                            <button className="pc-btn" type="button"
                                                style={{ ...S.smallBtn, flex: 1, ...(pv.winner === match.team1 ?
                                                        S.smallBtnDone : {}) }}
                                                onClick={() => setManualWinner(p, match.team1)}>
                                                {flagOf(match.team1)} {match.team1}
                                            </button>
                                            <button className="pc-btn" type="button"
                                                style={{ ...S.smallBtn, flex: 1, ...(pv.winner === match.team2 ?
                                                        S.smallBtnDone : {}) }}
                                                onClick={() => setManualWinner(p, match.team2)}>
                                                {flagOf(match.team2)} {match.team2}
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        );
                    })}
                    <div style={S.row}>
                        <button className="pc-btn" style={S.cancelBtn} onClick={onClose}>Cancel</button>
                        <button className="pc-btn pc-gold-btn" style={{ ...S.goldBtn, flex: 1 }}
                        onClick={() => onSave(match.id, vals)}>Save Predictions</button>
                    </div>
                </Veil>
            );
        }

        // ── ResultModal ──
        function ResultModal({ match, onSave, onClear, onClose }) {
            const isKO = match.stage !== "Group Stage";
            const [s1, setS1] = useState(match.result?.score1 ?? "");
            const [s2, setS2] = useState(match.result?.score2 ?? "");
            const [manualWinner, setManualWinner] = useState(match.result?.winner && match.result.winner !== "Draw" ? match
                .result.winner : "");

            const scoresEnteredAndLevel = s1 !== "" && s2 !== "" && Number(s1) === Number(s2);
            const autoWinner = s1 !== "" && s2 !== "" ?
                (Number(s1) > Number(s2) ? match.team1 : Number(s2) > Number(s1) ? match.team2 : "") :
                "";

            const winner = isKO ?
                (scoresEnteredAndLevel ? manualWinner : autoWinner) :
                (s1 !== "" && s2 !== "" ? (autoWinner || "Draw") : "");

            const needsManualPick = isKO && scoresEnteredAndLevel;

            return (
                <Veil onBg={onClose}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                        <p style={S.mh}>🎯 Set Result</p>
                        <button className="pc-btn" style={S.xBtn} onClick={onClose}>✕</button>
                    </div>
                    <p style={{ fontSize: 13, color: "#9a9488", margin: "0 0 16px" }}>
                        {flagOf(match.team1)} {match.team1} vs {match.team2} {flagOf(match.team2)}
                    </p>
                    <div style={{ display: "flex", gap: 12, marginBottom: 12 }}>
                        <ScoreRow label={match.team1} val={s1} onChange={setS1} accent="#ffd54a" />
                        <ScoreRow label={match.team2} val={s2} onChange={setS2} accent="#ffd54a" />
                    </div>
                    {needsManualPick && (
                        <div style={{ marginBottom: 12 }}>

        // ── VerifyPanel ──
        function VerifyPanel({ matches }) {
            const completed = matches.filter(m => m.result?.winner);
            const [selId, setSelId] = useState(completed[0]?.id ?? null);
            const sel = completed.find(m => m.id === selId) || completed[completed.length - 1];
            if (!completed.length) {
                return (
                    <div className="pc-card-hover" style={{ ...S.card, padding: 16, marginTop: 10 }}>

                            Math</div>

                            you can audit how points were calculated here.</div>
                    </div>
                );
            }
            const isBig = BIG_STAGES.includes(sel.stage);
            return (
                <div className="pc-card-hover" style={{ ...S.card, padding: 16, marginTop: 10 }}>
                    <div style={{ fontWeight: 700, color: "#ffd54a", marginBottom: 4,
                            fontFamily: "'Space Grotesk', -apple-system, 'Segoe UI', sans-serif" }}>🔬 Verify the Math
                    </div>
                    <div style={{ fontSize: 11.5, color: "#6b6450", marginBottom: 10, lineHeight: 1.5 }}>
                        Pick any finished match to see exactly how each player's points were worked out — no guessing, no
                        black box.
                    </div>
                    <select className="pc-input" style={S.sel} value={sel.id} onChange={e => setSelId(Number(e.target
                            .value))}>
                        {completed.map(m => (
                            <option key={m.id} value={m.id}>{m.team1} {m.result.score1}–{m.result.score2} {m.team2} ({
                                    m.stage})</option>
                        ))}
                    </select>
                    <div style={{ marginTop: 12, fontSize: 12, color: "#9a9488", marginBottom: 8 }}>
                        Actual result: <b style={{ color: "#fff" }}>{sel.result.winner}</b> won {sel.result.score1}–{sel
                            .result.score2}
                        {isBig && <span style={{ color: "#c9a13b" }}> · SF/Final → 2pt win / 2.5pt draw-bonus / 3pt
                            exact</span>}
                        {KNOCKOUT_STAGES.includes(sel.stage) && !isBig && <span style={{ color: "#c9a13b" }}> · knockout →
                            1pt win / 1.5pt draw-bonus / 2pt exact</span>}
                        {!KNOCKOUT_STAGES.includes(sel.stage) && <span style={{ color: "#c9a13b" }}> · group stage → 1pt
                            win / 2pt exact</span>}
                    </div>
                    {PLAYERS.map(pl => {
                        const pr = sel.predictions?.[pl];
                        if (!pr?.winner) return (
                            <div key={pl} style={S.verifyRow}>
                                <b style={{ color: "#ffd54a",
                                        fontFamily: "'Space Grotesk', -apple-system, 'Segoe UI', sans-serif",
                                        fontSize: 12.5 }}>{pl}</b>
                                <span style={{ color: "#6b6450", fontSize: 12 }}>no prediction submitted → 0 pts</span>
                            </div>
                        );
                        const pts = calcPts({ [pl]: pr }, sel.result, sel.stage)[pl] ?? 0;
                        const winnerMatch = pr.winner.trim().toLowerCase() === sel.result.winner.trim().toLowerCase();
                        const exactMatch = winnerMatch && numEq(pr.score1, sel.result.score1) && numEq(pr.score2, sel
                            .result.score2);
                        const drawBonus = winnerMatch && !exactMatch && isPredictedDraw(pr) && KNOCKOUT_STAGES.includes(
                            sel.stage) && numEq(sel.result.score1, sel.result.score2);
                        return (
                            <div key={pl} style={S.verifyRow}>
                                <b style={{ color: "#ffd54a",
                                        fontFamily: "'Space Grotesk', -apple-system, 'Segoe UI', sans-serif",
                                        fontSize: 12.5 }}>{pl}</b>
                                <span style={{ fontSize: 12, color: "#c9a13b" }}>predicted {pr.winner} {pr.score1}–{pr
                                        .score2}</span>
                                <span style={{ fontSize: 11, color: "#6b6450" }}>
                                    {!winnerMatch && "→ wrong winner"}
                                    {winnerMatch && exactMatch && "→ correct winner + exact score"}
                                    {drawBonus &&
                                        "→ correct winner + drew score predicted + actual went to pens 🎯 bonus"}
                                    {winnerMatch && !exactMatch && !drawBonus &&
                                    "→ correct winner, different score"}
                                </span>
                                <span style={{ ...S.ptBadge, alignSelf: "flex-start",
                                        background: pts >= 2 ? "#1a4d2e" : pts === 1.5 || pts === 2.5 ? "#5a3a08" :
                                            pts === 1 ? "#5a4416" : "#4a1818",
                                        color: pts >= 2 ? "#4ade80" : pts === 1.5 || pts === 2.5 ? "#fb923c" : pts ===
                                            1 ? "#facc15" : "#fca5a5" }}>
                                    = {pts} pts
                                </span>
                            </div>
                        );
                    })}
                </div>
            );
        }

        // ── MAIN APP ──
        function App() {
            const [app, setApp] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [tab, setTab] = useState("matches");
            const [toast, setToast] = useState("");
            const [pinOpen, setPinOpen] = useState(false);
            const [pinVal, setPinVal] = useState("");
            const [pinErr, setPinErr] = useState(false);
            const [rModal, setRModal] = useState(null);
            const [pModal, setPModal] = useState(null);
            const [histP, setHistP] = useState(null);
            const [grpFilter, setGrpFilter] = useState("ALL");
            const [searchQ, setSearchQ] = useState("");
            const [impTxt, setImpTxt] = useState("");
            const [impErr, setImpErr] = useState("");
            const [syncState, setSyncState] = useState("loading");
            const [lastSync, setLastSync] = useState(null);
            const [confirmClear, setConfirmClear] = useState(null);
            const [editKO, setEditKO] = useState(null);
            const [deleteKO, setDeleteKO] = useState(null);
            const [editAwardPlayer, setEditAwardPlayer] = useState(null);
            const [editAwardResults, setEditAwardResults] = useState(false);
            const [editStandPlayer, setEditStandPlayer] = useState(null);
            const [editStandResults, setEditStandResults] = useState(false);

            const loaded = useRef(false);
            const appRef = useRef(null);
            const modalOpenRef = useRef(false);
            appRef.current = app;
            modalOpenRef.current = !!(pModal || rModal || pinOpen || editKO || confirmClear || deleteKO ||
                editAwardPlayer || editAwardResults || editStandPlayer || editStandResults);

            function withRev(updater) {
                setApp(prev => {
                    const next = updater(prev);
                    const advancedMatches = autoAdvanceBracket(next.matches);
                    return { ...next, matches: advancedMatches, rev: (prev?.rev || 0) + 1, updatedAt: Date.now(),
                        updatedBy: isAdmin ? "Admin" : undefined };
                });
            }

            useEffect(() => {
                sRead().then(({ data: d }) => {
                    const savedById = Object.fromEntries((d?.matches || []).map(m => [m.id, m]));
                    const merged = BASE_MATCHES.map(bm => {
                        const saved = savedById[bm.id];
                        return { ...bm, predictions: saved?.predictions || SAVED_PREDS[bm.id] || {},
                            result: saved?.result || SAVED_RESULTS[bm.id] || null };
                    });
                    const storedExtra = (d?.matches || []).filter(m => m.stage !== "Group Stage");
                    const defaultKnockout = [
                        ...SAVED_R32.map(r => ({ ...r, stage: "Round of 32" })),
                        ...SAVED_KNOCKOUT_REST,
                    ];
                    const extra = storedExtra.length > 0 ? storedExtra :
                        defaultKnockout.map(r => {
                            const stored = storedExtra.find(m => m.id === r.id);
                            return { ...r, predictions: stored?.predictions || r.predictions || {},
                                result: stored?.result || r.result || null };
                        });
                    setApp({
                        matches: autoAdvanceBracket([...merged, ...extra]),
                        nid: d?.nid || 105,
                        awards: d?.awards || SAVED_AWARD_RESULTS,
                        awardPreds: d?.awardPreds || SAVED_AWARD_PREDS,
                        standings: d?.standings || SAVED_STANDING_RESULTS,
                        standingPreds: d?.standingPreds || SAVED_STANDING_PREDS,
                        rev: d?.rev || 0,
                        updatedAt: d?.updatedAt || null,
                        updatedBy: d?.updatedBy || null,
                    });
                    loaded.current = true;
                    setSyncState("synced");
                    setLastSync(Date.now());
                });
            }, []);

            useEffect(() => {
                if (!loaded.current || !app) return;
                setSyncState("syncing");
                let cancelled = false;
                let attempt = 0;
                const tryWrite = () => {
                    sWrite(app).then(ok => {
                        if (cancelled) return;
                        if (ok) { setSyncState("synced");
                            setLastSync(Date.now()); return; }
                        attempt++;
                        if (attempt <= 3) setTimeout(tryWrite, 1500 * attempt);
                        else setSyncState("offline");
                    });
                };
                tryWrite();
                return () => { cancelled = true; };
            }, [app]);

            useEffect(() => {
                const id = setInterval(() => {
                    if (modalOpenRef.current) return;
                    sRead().then(({ data: remote, notFound, error }) => {
                        if (!remote) {
                            setLastSync(Date.now());
                            if (error && !notFound) setSyncState("offline");
                            return;
                        }
                        const localRev = appRef.current?.rev || 0;
                        const remoteRev = remote.rev || 0;
                        if (remoteRev > localRev) {
                            const savedById = Object.fromEntries((remote.matches || []).map(m => [m.id, m]));
                            const merged = BASE_MATCHES.map(bm => {
                                const saved = savedById[bm.id];
                                return { ...bm, predictions: saved?.predictions || {},
                                    result: saved?.result || null };
                            });
                            const extra = (remote.matches || []).filter(m => m.stage !== "Group Stage");
                            setApp({
                                matches: [...merged, ...extra],
                                nid: remote.nid || 73,
                                awards: remote.awards || {},
                                awardPreds: remote.awardPreds || {},
                                standings: remote.standings || {},
                                standingPreds: remote.standingPreds || {},
                                rev: remoteRev,
                                updatedAt: remote.updatedAt || null,
                                updatedBy: remote.updatedBy || null,
                            });
                            setLastSync(Date.now());
                            say("🔄 Synced new updates");
                        } else {
                            setLastSync(Date.now());
                        }
                    }).catch(() => setSyncState("offline"));
                }, 20000);
                return () => clearInterval(id);
            }, []);

            function say(msg) { setToast(msg);
                setTimeout(() => setToast(""), 2200); }

            function login() {
                if (pinVal.trim().toUpperCase() === PIN) { setIsAdmin(true);
                    setPinOpen(false);
                    setPinVal("");
                    setPinErr(false);
                    say("🔐 Admin mode"); } else setPinErr(true);
            }

            function savePreds(matchId, preds) {
                withRev(prev => ({ ...prev, matches: prev.matches.map(m => m.id === matchId ? { ...m, predictions: preds } :
                        m) }));
                say("✅ Predictions saved!");
                setPModal(null);
            }

            function saveResult(matchId, winner, s1, s2) {
                withRev(prev => ({ ...prev, matches: prev.matches.map(m => m.id === matchId ? { ...m,
                            result: { winner: winner.trim(), score1: s1, score2: s2 } } : m) }));
                say("✅ Result saved!");
                setRModal(null);
            }

            function requestClearResult(matchId) { setConfirmClear(matchId); }

            function confirmClearResult() {
                const matchId = confirmClear;
                withRev(prev => ({ ...prev, matches: prev.matches.map(m => m.id === matchId ? { ...m, result: null } :
                        m) }));
                say("↩️ Result cleared");
                setConfirmClear(null);
                setRModal(null);
            }

            function addKnockout(stage, team1, team2) {
                withRev(prev => {
                    const id = prev.nid;
                    return { ...prev, matches: [...prev.matches, { id, stage, team1: team1.trim(), team2: team2
                                .trim(), predictions: {}, result: null }], nid: id + 1 };
                });
                say("✅ Match added!");
            }

            function updateKnockout(matchId, stage, team1, team2) {
                withRev(prev => ({ ...prev, matches: prev.matches.map(m => m.id === matchId ? { ...m, stage,
                            team1: team1.trim(), team2: team2.trim() } : m) }));
                say("✅ Match updated!");
                setEditKO(null);
            }

            function requestDeleteKnockout(matchId) { setDeleteKO(matchId); }

            function confirmDeleteKnockout() {
                const matchId = deleteKO;
                withRev(prev => ({ ...prev, matches: prev.matches.filter(m => m.id !== matchId) }));
                say("🗑 Match removed");
                setDeleteKO(null);
            }

            function saveAwardPreds(player, vals) {
                withRev(prev => ({ ...prev, awardPreds: { ...prev.awardPreds, [player]: vals } }));
                say(`✅ ${player}'s award picks saved!`);
            }

            function saveAwardResults(vals) {
                withRev(prev => ({ ...prev, awards: vals }));
                say("✅ Award results saved!");
            }

            function saveStandingPreds(player, vals) {
                withRev(prev => ({ ...prev, standingPreds: { ...prev.standingPreds, [player]: vals } }));
                say(`✅ ${player}'s final picks saved!`);
            }

            function saveStandingResults(vals) {
                withRev(prev => ({ ...prev, standings: vals }));
                say("✅ Final standings saved!");
            }

            function doImport() {
                try {
                    const d = JSON.parse(impTxt.trim());
                    if (!Array.isArray(d.matches)) throw 0;
                    const savedById = Object.fromEntries(d.matches.map(m => [m.id, m]));
                    const merged = BASE_MATCHES.map(bm => {
                        const saved = savedById[bm.id];
                        return { ...bm, predictions: saved?.predictions || {}, result: saved?.result || null };
                    });
                    const extra = d.matches.filter(m => m.stage && m.stage !== "Group Stage");
                    const maxId = Math.max(72, ...d.matches.map(m => m.id || 0));
                    withRev(() => ({
                        matches: [...merged, ...extra],
                        nid: d.nid || d.nextId || maxId + 1,
                        awards: d.awards || {},
                        awardPreds: d.awardPreds || {},
                        standings: d.standings || {},
                        standingPreds: d.standingPreds || {},
                    }));
                    setImpTxt("");
                    setImpErr("");
                    say("✅ Imported!");
                } catch { setImpErr("ভুল data — সঠিক ভাবে copy করো"); }
            }

            const awardPts = app ? calcAwardPts(app.awardPreds, app.awards) : {};
            const standingPts = app ? calcStandingPts(app.standingPreds, app.standings) : {};
            const lb = (() => {
                if (!app) return PLAYERS.map(n => ({ name: n, p: 0 }));
                const t = Object.fromEntries(PLAYERS.map(n => [n, 0]));
                app.matches.forEach(m => {
                    if (!m.result?.winner) return;
                    const p = calcPts(m.predictions, m.result, m.stage);
                    PLAYERS.forEach(n => { t[n] += p[n] ?? 0; });
                });
                PLAYERS.forEach(n => {
                    t[n] += awardPts[n]?.total ?? 0;
                    t[n] += standingPts[n]?.total ?? 0;
                });
                return PLAYERS.map(n => ({ name: n, p: t[n] })).sort((a, b) => b.p - a.p);
            })();

            const done = app?.matches.filter(m => m.result?.winner).length ?? 0;
            const total = app?.matches.length ?? 0;
            const groups = ["ALL", "A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];

            if (!app) return (
                <div style={{ ...S.page, display: "flex", flexDirection: "column", alignItems: "center",
                        justifyContent: "center", minHeight: "100vh" }} className="pc-root">
                    <div style={S.loadRing} className="pc-glow-pulse">
                        <div style={S.loadRingBorder} className="pc-ring-spin" />
                        <div style={S.loadBall} className="pc-bounce">⚽</div>
                    </div>
                    <div style={{ color: "#d9b65c", marginTop: 22, fontSize: 13, fontWeight: 800, letterSpacing: 2.5,
                            fontFamily: "'Space Grotesk', -apple-system, 'Segoe UI', sans-serif",
                            textTransform: "uppercase" }}>Loading World Cup…</div>
                    <div style={S.loadBarTrack}><div style={S.loadBarFill} className="pc-load-fill" /></div>
                </div>
            );

            const gsMatches = app.matches.filter(m => m.stage === "Group Stage");
            const koMatches = app.matches.filter(m => m.stage !== "Group Stage");
            const q = searchQ.trim().toLowerCase();
            const matchesSearch = m => !q || m.team1.toLowerCase().includes(q) || m.team2.toLowerCase().includes(q);
            const filteredGs = (grpFilter === "ALL" ? gsMatches : gsMatches.filter(m => m.group === grpFilter)).filter(
                matchesSearch);
            const filteredKo = koMatches.filter(matchesSearch);

            return (
                <div style={S.page} className="pc-root">
                    <div style={S.colorStrip} className="pc-strip" />
                    <span style={{ ...S.sparkle, top: 120, left: 18 }} className="pc-sparkle">✦</span>
                    <span style={{ ...S.sparkle, top: 260, right: 14, animationDelay: ".7s" }}
                    className="pc-sparkle">✦</span>
                    <span style={{ ...S.sparkle, top: 480, left: 26, animationDelay: "1.3s" }}
                    className="pc-sparkle">✦</span>
                    {toast && <div style={S.toast} className="pc-toast-in">{toast}</div>}

                    {pinOpen && (
                        <Veil onBg={() => { setPinOpen(false);
                            setPinVal("");
                            setPinErr(false); }}>
                            <p style={S.mh}>🔐 Admin Login</p>
                            <p style={{ fontSize: 12, color: "#9a8454", margin: "0 0 12px" }}>Enter the admin passcode to
                                edit matches &amp; results.</p>
                            <input className="pc-input" style={{ ...S.inp, textAlign: "center", fontSize: 20,
                                    letterSpacing: 6, marginBottom: 8,
                                    fontFamily: "'JetBrains Mono', 'SF Mono', Consolas, monospace",
                                    textTransform: "uppercase" }}
                            type="password" maxLength={12} placeholder="Passcode" value={pinVal} autoFocus
                            onChange={e => { setPinVal(e.target.value);
                                setPinErr(false); }}
                            onKeyDown={e => e.key === "Enter" && login()} />
                            {pinErr && <p style={S.err}>❌ Wrong passcode</p>}
                            <div style={S.row}>
                                <button className="pc-btn" style={S.cancelBtn} onClick={() => { setPinOpen(false);
                                        setPinVal(""); }}>Cancel</button>
                                <button className="pc-btn pc-gold-btn" style={{ ...S.goldBtn, flex: 1 }}
                                onClick={login}>Login</button>
                            </div>
                        </Veil>
                    )}
                    {pModal && <PredsModal match={pModal} onSave={savePreds} onClose={() => setPModal(null)} />}
                    {rModal && <ResultModal match={rModal} onSave={saveResult} onClear={requestClearResult}
                        onClose={() => setRModal(null)} />}
                    {confirmClear && (
                        <Veil onBg={() => setConfirmClear(null)}>
                            <p style={S.mh}>↩️ Clear this result?</p>
                            <p style={{ fontSize: 13, color: "#9a9488", margin: "0 0 18px", lineHeight: 1.6 }}>
                                এই match-এর result মুছে গেলে সবার points আবার recalculate হবে। এটা undo করা যাবে না —
                                চাইলে আবার নতুন result বসাতে পারবে।
                            </p>
                            <div style={S.row}>
                                <button className="pc-btn" style={S.cancelBtn} onClick={() => setConfirmClear(null)}>Cancel</button>
                                <button className="pc-btn" style={{ ...S.redBtn, flex: 1 }}
                                onClick={confirmClearResult}>🗑 Yes, clear it</button>
                            </div>
                        </Veil>
                    )}
                    {editKO && <EditKnockoutModal match={editKO} onSave={updateKnockout}
                        onClose={() => setEditKO(null)} />}
                    {deleteKO && (
                        <Veil onBg={() => setDeleteKO(null)}>
                            <p style={S.mh}>🗑 Delete this match?</p>
                            <p style={{ fontSize: 13, color: "#9a9488", margin: "0 0 18px", lineHeight: 1.6 }}>
                                সবার predictions ও result সহ এই knockout match permanently মুছে যাবে।
                            </p>
                            <div style={S.row}>
                                <button className="pc-btn" style={S.cancelBtn} onClick={() => setDeleteKO(null)}>Cancel</button>
                                <button className="pc-btn" style={{ ...S.redBtn, flex: 1 }}
                                onClick={confirmDeleteKnockout}>🗑 Yes, delete</button>
                            </div>
                        </Veil>
                    )}
                    {histP && (
                        <Veil onBg={() => setHistP(null)}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
                                    marginBottom: 12 }}>
                                <p style={{ ...S.mh, margin: 0 }}>📋 {histP}'s History</p>
                                <button className="pc-btn" style={S.xBtn} onClick={() => setHistP(null)}>✕</button>
                            </div>
                            <div style={{ maxHeight: 400, overflowY: "auto" }}>
                                {app.matches.map(m => {
                                    const pr = m.predictions?.[histP];
                                    const pts = m.result?.winner ? (calcPts(m.predictions, m.result, m
                                        .stage)[histP] ?? 0) : null;
                                    return (
                                        <div key={m.id} style={S.histRow}>
                                            <div style={{ flex: 1 }}>
                                                <div style={{ fontSize: 10, color: "#c9a13b", fontWeight: 700,
                                                        textTransform: "uppercase", letterSpacing: 0.4 }}>
                                                    {m.stage}{m.group ? ` · Group ${m.group}` : ""}
                                                </div>
                                                <div style={{ fontSize: 13, fontWeight: 600, color: "#fff" }}>{m
                                                        .team1} vs {m.team2}</div>
                                                <div style={{ fontSize: 12, color: "#6b6450" }}>
                                                    Predict: {pr?.winner ? `${pr.winner} ${pr.score1}–${pr.score2}` :
                                                        "—"}
                                                </div>
                                                {m.result?.winner && <div style={{ fontSize: 12, color: "#4ade80" }}>
                                                        Result: {m.result.winner} {m.result.score1}–{m.result
                                                        .score2}</div>}
                                            </div>
                                            {pts !== null && (
                                                <span style={{ ...S.ptBadge, padding: "4px 10px", fontSize: 12,
                                                        background: pts >= 2 ? "#1a4d2e" : pts === 1.5 || pts ===
                                                            2.5 ? "#5a3a08" : pts === 1 ? "#5a4416" : "#4a1818",
                                                        color: pts >= 2 ? "#4ade80" : pts === 1.5 || pts === 2.5 ?
                                                            "#fb923c" : pts === 1 ? "#facc15" : "#fca5a5" }}>
                                                    {pts >= 2 ? `⭐ ${pts}` : pts === 1.5 || pts === 2.5 ?
                                                        `🎯 ${pts}` : `${pts > 0 ? "✅ 1" : "❌ 0"}`} pts
                                                </span>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                            <button className="pc-btn pc-gold-btn" style={{ ...S.goldBtn, width: "100%", marginTop: 12 }}
                            onClick={() => setHistP(null)}>Close</button>
                        </Veil>
                    )}

                    <header style={S.header} className="pc-fade-up">
                        <div style={S.stadiumSweep} />
                        <span style={{ ...S.deco, top: 8, right: 64, fontSize: 22 }} className="pc-float">⚽</span>
                        <span style={{ ...S.deco, bottom: 2, left: 14, fontSize: 17, animationDelay: "1.4s" }}
                        className="pc-float">🏆</span>
                        <span style={{ ...S.deco, top: 46, right: 18, fontSize: 13, animationDelay: "2.6s" }}
                        className="pc-float">✨</span>
                        <span style={{ ...S.deco, top: 14, left: 120, fontSize: 14, animationDelay: "3.2s" }}
                        className="pc-float">🥅</span>
                        <span style={{ ...S.deco, bottom: 8, right: 120, fontSize: 12, animationDelay: "1.9s" }}
                        className="pc-float">🎯</span>
                        <div style={S.hTopRow}>
                            <div style={S.h26}>
                                <span style={S.h26Num} className="pc-shimmer-text">26</span>
                                <div style={S.h26Text}>
                                    <div style={S.h26Title}>PREDICT CUP</div>
                                    <div style={S.h26Sub}>FIFA WORLD CUP 2026™ · FAN EDITION</div>
                                </div>
                            </div>
                            <div style={S.trophyIcon} className="pc-crown pc-trophy-hover">🏆</div>
                        </div>
                        <div style={S.hBottomRow}>
                            <div style={S.hNames}>⚽ Ahin &nbsp;·&nbsp; Sifat &nbsp;·&nbsp; Tamim</div>
                            {isAdmin ?
                                <button className="pc-btn" style={S.adminPill} onClick={() => setIsAdmin(false)}>🔐 ADMIN
                                    ✕</button> :
                                <button className="pc-btn" style={S.loginPill} onClick={() => setPinOpen(true)}>🔐
                                Admin</button>}
                        </div>
                        <div style={S.lbBar}>
                            {lb.map((p, i) => (
                                <div key={p.name} style={{ ...S.lbChip, borderColor: HOST_ACCENTS[i] + "55",
                                        ...(i === 0 && p.p > 0 ? { borderColor: "#ffd54a99",
                                            boxShadow: "0 0 0 1px #ffd54a33 inset" } : {}) }}>
                                    {MEDALS[i]} <b style={{ marginLeft: 3,
                                            fontFamily: "'Space Grotesk', -apple-system, 'Segoe UI', sans-serif" }}>{p
                                            .name}</b>
                                    <span style={S.chipPt}>{p.p}pt</span>
                                </div>
                            ))}
                            <div style={{ ...S.lbChip, color: "#6b6450", borderColor: "#2e2818" }}>{done}/{total} ✓</div>
                        </div>
                    </header>

                    <TabNav tab={tab} setTab={setTab} />

                    <main style={S.main} key={tab}>
                        <div className="pc-pop-in">
                            {tab === "matches" && (
                                <>
                                    <div style={S.searchWrap}>
                                        <span style={S.searchIcon}>🔎</span>
                                        <input className="pc-input" style={S.searchInp} value={searchQ}
                                            placeholder="Search team name…" onChange={e => setSearchQ(e.target.value)} />
                                        {searchQ && <button className="pc-btn" style={S.searchClear}
                                        onClick={() => setSearchQ("")}>✕</button>}
                                    </div>
                                    <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 14 }}>
                                        {groups.map(g => (
                                            <button key={g} className="pc-btn" style={{ ...S.grpBtn,
                                                    ...(grpFilter === g ? S.grpBtnOn : {}) }}
                                            onClick={() => setGrpFilter(g)}>
                                                {g === "ALL" ? "All Groups" : `Grp ${g}`}
                                            </button>
                                        ))}
                                    </div>
                                    {filteredGs.length === 0 && filteredKo.length === 0 && (
                                        <div style={S.empty}>
                                            <div style={{ fontSize: 40 }}>🔍</div>
                                            <div style={{ fontWeight: 600, marginTop: 8, color: "#9a9488" }}>No matches
                                                found</div>
                                            <div style={{ fontSize: 13, color: "#6b6450", marginTop: 4 }}>Try a different
                                                team name or clear filters</div>
                                        </div>
                                    )}
                                    {filteredGs.map((match, i) => (
                                        <MatchCard key={match.id} match={match} isAdmin={isAdmin} idx={i}
                                            onPred={() => setPModal(match)} onResult={() => setRModal(match)} />
                                    ))}
                                    {filteredKo.length > 0 && (
                                        <>
                                            {STAGES.filter(s => s !== "Group Stage").map(stage => {
                                                const sm = filteredKo.filter(m => m.stage === stage);
                                                if (!sm.length) return null;
                                                return (
                                                    <div key={stage}>
                                                        <div style={S.stageHd}>{STAGE_ICO[stage]} {stage}</div>
                                                        {sm.map((match, i) => (
                                                            <MatchCard key={match.id} match={match} isAdmin={isAdmin}
                                                                idx={i}
                                                                onPred={() => setPModal(match)}
                                                                onResult={() => setRModal(match)}
                                                                onEditKO={() => setEditKO(match)}
                                                                onDeleteKO={() => requestDeleteKnockout(match.id)} />
                                                        ))}
                                                    </div>
                                                );
                                            })}
                                        </>
                                    )}
                                </>
                            )}

                            {tab === "board" && (
                                <div>
                                    <h2 style={S.secH}>🏆 Leaderboard</h2>
                                    <Podium lb={lb} />
                                    {lb.map((p, i) => (
                                        <div key={p.name} className="pc-card-hover pc-fade-up" style={{ ...S.lbRow,
                                                ...(i === 0 && p.p > 0 ? S.lbGold : {}),
                                                borderLeftColor: HOST_ACCENTS[i],
                                                animationDelay: `${i * 0.08}s` }}>
                                            <div style={{ fontSize: 26, width: 38 }}>{MEDALS[i]}</div>
                                            <div style={{ flex: 1, fontWeight: 700, fontSize: 18,
                                                    fontFamily: "'Space Grotesk', -apple-system, 'Segoe UI', sans-serif" }}>{p
                                                    .name}</div>
                                            <div style={{ fontWeight: 900, color: "#ffd54a", fontSize: 24,
                                                    fontFamily: "'Space Grotesk', -apple-system, 'Segoe UI', sans-serif" }}>{p
                                                    .p}</div>
                                            <div style={{ fontSize: 12, color: "#6b6450", marginLeft: 3 }}>pts</div>
                                            <div style={{ width: 64, background: "#1c1810", borderRadius: 4, height: 10,
                                                    marginLeft: 12, overflow: "hidden" }}>
                                                <div style={{ height: 10, borderRadius: 4,
                                                        transition: "width .8s cubic-bezier(.2,.8,.3,1)",
                                                        width: `${Math.max(6, (p.p / Math.max(1, lb[0].p)) * 100)}%`,
                                                        background: i === 0 ?
                                                            "linear-gradient(90deg,#ffd54a,#fff7d6)" : i === 1 ?
                                                            "#9a9488" : "#b8743a" }} />
                                            </div>
                                        </div>
                                    ))}
                                    {PLAYERS.map((pl, idx) => {
                                        const plMatches = app.matches.filter(m => m.result?.winner && m
                                            .predictions?.[pl]?.winner);
                                        const plMatchPts = plMatches.reduce((acc, m) => acc + (calcPts(m
                                            .predictions, m.result, m.stage)[pl] ?? 0), 0);
                                        const correct = plMatches.filter(m => calcPts(m.predictions, m.result, m
                                            .stage)[pl] > 0).length;
                                        const perfect = plMatches.filter(m => {
                                            const exactPt = BIG_STAGES.includes(m.stage) ? 3 : 2;
                                            return calcPts(m.predictions, m.result, m.stage)[pl] ===
                                            exactPt;
                                        }).length;
                                        const plAwardPts = awardPts[pl]?.total ?? 0;
                                        const plStandingPts = standingPts[pl]?.total ?? 0;
                                        const plPts = plMatchPts + plAwardPts + plStandingPts;
                                        return (
                                            <div key={pl} className="pc-card-hover" style={{ ...S.card,
                                                    padding: 14, marginBottom: 8,
                                                    borderLeft: `3px solid ${HOST_ACCENTS[idx]}` }}>
                                                <div style={{ display: "flex", justifyContent: "space-between",
                                                        alignItems: "center", marginBottom: 8 }}>
                                                    <div style={{ fontWeight: 700, fontSize: 15,
                                                            color: "#ffd54a",
                                                            fontFamily: "'Space Grotesk', -apple-system, 'Segoe UI', sans-serif" }}>{pl}
                                                    </div>
                                                    <div style={{ fontWeight: 900, color: "#ffd54a",
                                                            fontSize: 18,
                                                            fontFamily: "'Space Grotesk', -apple-system, 'Segoe UI', sans-serif" }}>{plPts}
                                                        pts</div>
                                                </div>
                                                <div style={{ display: "flex", gap: 12, fontSize: 12,
                                                        color: "#9a9488", flexWrap: "wrap" }}>
                                                    <span>✅ {correct} correct</span>
                                                    <span>⭐ {perfect} perfect</span>
                                                    <span>📋 {plMatches.length} predicted</span>
                                                    {plAwardPts > 0 && <span>🏅 +{plAwardPts} awards</span>}
                                                    {plStandingPts > 0 && <span>🏆 +{plStandingPts} finals</span>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                    <div className="pc-card-hover" style={{ ...S.card, padding: 16, marginTop: 8 }}>
                                        <div style={{ fontWeight: 700, color: "#ffd54a", marginBottom: 10,
                                                fontFamily: "'Space Grotesk', -apple-system, 'Segoe UI', sans-serif" }}>
                                            📜 Match Point Rules</div>
                                        {[
                                            ["⭐", "2 pts",
                                                "Group/R32/R16/QF — correct winner + exact score"],
                                            ["🎯", "1.5 pts",
                                                "R32/R16/QF — drew score predicted + match went to pens + correct team (bonus!)"
                                            ],
                                            ["✅", "1 pt", "Group/R32/R16/QF — correct winner only"],
                                            ["🌟", "3 pts",
                                                "Semi/3rd Place/Final — correct winner + exact score"],
                                            ["🎯", "2.5 pts",
                                                "Semi/3rd Place/Final — drew score predicted + match went to pens + correct team (bonus!)"
                                            ],
                                            ["🔥", "2 pts", "Semi/3rd Place/Final — correct winner only"],
                                            ["❌", "0 pts", "Wrong or no prediction"],
                                        ].map(([ic, pt, d]) => (
                                            <div key={d} style={{ display: "flex", gap: 8, alignItems: "center",
                                                    marginBottom: 8, fontSize: 13 }}>
                                                <span>{ic}</span><b style={{ minWidth: 44,
                                                        fontFamily: "'Space Grotesk', -apple-system, 'Segoe UI', sans-serif" }}>{pt}</b><span
                                                    style={{ color: "#9a9488" }}>{d}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <VerifyPanel matches={app.matches} />
                                </div>
                            )}

                            {tab === "awards" && (
                                <AwardsTab
                                    app={app} isAdmin={isAdmin} awardPts={awardPts} standingPts={standingPts}
                                    editAwardPlayer={editAwardPlayer} setEditAwardPlayer={setEditAwardPlayer}
                                    editAwardResults={editAwardResults} setEditAwardResults={setEditAwardResults}
                                    editStandPlayer={editStandPlayer} setEditStandPlayer={setEditStandPlayer}
                                    editStandResults={editStandResults} setEditStandResults={setEditStandResults}
                                    onSaveAwardPreds={saveAwardPreds} onSaveAwardResults={saveAwardResults}
                                    onSaveStandingPreds={saveStandingPreds} onSaveStandingResults={saveStandingResults}
                                />
                            )}

                            {tab === "history" && (
                                <div>
                                    <h2 style={S.secH}>📋 Player History</h2>
                                    <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
                                        {PLAYERS.map((p, i) => (
                                            <button key={p} className="pc-btn pc-gold-btn" style={{ ...S.goldBtn,
                                                    flex: 1, borderBottom: `3px solid ${HOST_ACCENTS[i]}` }}
                                            onClick={() => setHistP(p)}>{p}</button>
                                        ))}
                                    </div>
                                    <p style={{ textAlign: "center", color: "#6b6450", fontSize: 13 }}>👆 Select a player
                                        to view history</p>
                                </div>
                            )}

                            {tab === "knockout" && (
                                <GroupTableAndBracket matches={app.matches} isAdmin={isAdmin}
                                onAddKnockout={addKnockout} />
                            )}

                            {tab === "share" && (
                                <div>
                                    <h2 style={S.secH}>📤 Share Data</h2>
                                    <p style={{ fontSize: 13, color: "#9a9488", marginBottom: 14, lineHeight: 1.7 }}>
                                        Match/result update করার পর data copy করে WhatsApp-এ পাঠাও।
                                        বন্ধুরা paste করে import করলে তাদের কাছেও latest data দেখাবে।
                                    </p>
                                    <div className="pc-card-hover" style={{ ...S.card, padding: 16, marginBottom: 10 }}>
                                        <div style={{ fontWeight: 700, color: "#fff", marginBottom: 8 }}>📋 তোমার current
                                            data</div>
                                        <textarea className="pc-input" style={S.ta} readOnly value={JSON.stringify(app)}
                                            onFocus={e => e.target.select()} />
                                        <button className="pc-btn pc-gold-btn" style={{ ...S.goldBtn, width: "100%",
                                                marginTop: 8 }}
                                            onClick={() => navigator.clipboard.writeText(JSON.stringify(app)).then(() =>
                                                    say("📋 Copied!")).catch(() => say("Long-press → Copy all"))}>
                                            📋 Copy
                                        </button>
                                    </div>
                                    <div className="pc-card-hover" style={{ ...S.card, padding: 16 }}>
                                        <div style={{ fontWeight: 700, color: "#fff", marginBottom: 8 }}>📥 বন্ধুর data
                                            import করো</div>
                                        <textarea className="pc-input" style={S.ta} value={impTxt}
                                            placeholder="Paste here…" onChange={e => { setImpTxt(e.target.value);
                                                setImpErr(""); }} />
                                        {impErr && <p style={S.err}>{impErr}</p>}
                                        <button className="pc-btn pc-gold-btn" style={{ ...S.goldBtn, width: "100%",
                                                marginTop: 8 }} onClick={doImport}>📥 Import</button>
                                    </div>
                                    <div style={S.tip}>
                                        💡 Admin predict/result দেওয়ার পর copy → WhatsApp group → বন্ধুরা import করবে →
                                        সবার data sync হবে।
                                    </div>
                                    <div style={{ fontSize: 11, color: syncState === "synced" ? "#4ade80" : syncState ===
                                            "offline" ? "#fca5a5" : "#c9a13b", textAlign: "center", marginTop: 12 }}>
                                        {syncState === "synced" && "🟢 Live-synced"}
                                        {syncState === "syncing" && "🟡 Syncing…"}
                                        {syncState === "offline" && "🔴 Offline — using local copy"}
                                        {syncState === "loading" && "⏳ Loading…"}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    <footer style={S.footer}>
                        ⚽ Unofficial fan-made predict cup · Not affiliated with FIFA
                    </footer>
                </div>
            );
        }

        // ── mount ──
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
